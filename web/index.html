<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Autonomous Arena — AI Crypto Trader</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg: #07090f; --panel: #0e1320; --panel2: #131a2b; --border: #1d2740;
      --green: #00e6a8; --red: #ff4d6d; --dim: #5b6b86; --text: #e6ecf7; --accent: #6c8cff;
    }
    html, body { margin: 0; height: 100%; }
    body {
      background:
        radial-gradient(1200px 600px at 12% -10%, #16204022 0%, transparent 60%),
        radial-gradient(1000px 500px at 100% 0%, #2a164022 0%, transparent 55%),
        var(--bg);
      color: var(--text);
      font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #28324d; border-radius: 6px; }
    ::-webkit-scrollbar-thumb:hover { background: #38456b; }
    .glass {
      background: linear-gradient(180deg, #121a2c99, #0d1322cc);
      border: 1px solid var(--border);
      border-radius: 16px;
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 30px #00000055, inset 0 1px 0 #ffffff08;
    }
    .glass-hover { transition: transform .15s ease, border-color .15s ease, box-shadow .15s ease; }
    .glass-hover:hover { transform: translateY(-2px); border-color: #2f3d63; box-shadow: 0 14px 40px #00000077, 0 0 0 1px #2f3d6355; }
    .glow-green { text-shadow: 0 0 14px #00e6a877; }
    .glow-red { text-shadow: 0 0 14px #ff4d6d77; }
    .chip { border:1px solid var(--border); border-radius:999px; padding:2px 9px; font-size:11px; }
    .live-dot { width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 10px var(--green);animation:pulse 1.4s ease-in-out infinite;}
    .idle-dot { width:8px;height:8px;border-radius:50%;background:var(--dim);}
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:.35;transform:scale(.8);} }
    @keyframes fadein { from{opacity:0;transform:translateY(6px);} to{opacity:1;transform:none;} }
    .fadein { animation: fadein .35s ease both; }
    .grad-text { background: linear-gradient(90deg,#6c8cff,#00e6a8); -webkit-background-clip:text; background-clip:text; color:transparent; }
    .scan { position:relative; overflow:hidden; }
    .bar-track { background:#1a2236; border-radius:999px; overflow:hidden; }
    .tab-active { background: linear-gradient(90deg,#1b2540,#162038); border:1px solid #2f3d63; color:#fff; }
    .tab-idle { color: var(--dim); border:1px solid transparent; }
    .tab-idle:hover { color:#c6d2ea; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

const G = '#00e6a8', R = '#ff4d6d', DIM = '#5b6b86', ACCENT = '#6c8cff';
const api = (p) => fetch(p).then(r => r.json()).catch(() => null);
const fmt = (n, d = 2) => (Number(n) || 0).toLocaleString('en-US', { minimumFractionDigits: d, maximumFractionDigits: d });
const sign = (n, d = 2) => (n >= 0 ? '+' : '') + fmt(n, d);
const usd = (n, d = 2) => '$' + fmt(n, d);
const pct = (n) => sign(n, 2) + '%';
const pnlColor = (n) => (n > 0 ? G : n < 0 ? R : DIM);
const short = (s, n) => (s && s.length > n ? s.slice(0, n) + '…' : (s || ''));
const ago = (iso) => {
  if (!iso) return '—';
  const s = Math.max(0, (Date.now() - new Date(iso).getTime()) / 1000);
  if (s < 60) return Math.floor(s) + 's ago';
  if (s < 3600) return Math.floor(s / 60) + 'm ago';
  return Math.floor(s / 3600) + 'h ago';
};

// ── tiny SVG sparkline ──────────────────────────────────────────────────────
function Spark({ data, color = G, h = 34, w = 130 }) {
  if (!data || data.length < 2) return <svg width={w} height={h} />;
  const vals = data.map(d => d.value);
  const min = Math.min(...vals), max = Math.max(...vals);
  const rng = max - min || 1;
  const pts = data.map((d, i) => {
    const x = (i / (data.length - 1)) * w;
    const y = h - 4 - ((d.value - min) / rng) * (h - 8);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  });
  const id = 'g' + color.replace('#', '');
  return (
    <svg width={w} height={h} style={{ display: 'block' }}>
      <defs><linearGradient id={id} x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stopColor={color} stopOpacity="0.35" />
        <stop offset="100%" stopColor={color} stopOpacity="0" />
      </linearGradient></defs>
      <polyline points={pts.join(' ')} fill="none" stroke={color} strokeWidth="1.8" strokeLinejoin="round" strokeLinecap="round" />
      <polygon points={`0,${h} ${pts.join(' ')} ${w},${h}`} fill={`url(#${id})`} />
    </svg>
  );
}

// ── KPI stat ────────────────────────────────────────────────────────────────
function Kpi({ label, value, color, sub, big }) {
  return (
    <div className="glass glass-hover p-4 fadein">
      <p className="text-[11px] uppercase tracking-wider" style={{ color: DIM }}>{label}</p>
      <p className={`mono font-bold ${big ? 'text-3xl' : 'text-xl'} mt-1`} style={color ? { color } : {}}>{value}</p>
      {sub && <p className="text-xs mt-1" style={{ color: DIM }}>{sub}</p>}
    </div>
  );
}

// ── header / status bar ─────────────────────────────────────────────────────
function Header({ engine, config }) {
  const running = engine?.running;
  return (
    <div className="glass px-5 py-4 flex flex-wrap items-center gap-x-6 gap-y-2">
      <div className="flex items-center gap-3">
        <div style={{ width: 38, height: 38, borderRadius: 11, background: 'linear-gradient(135deg,#6c8cff,#00e6a8)', display: 'flex', alignItems: 'center', justifyContent: 'center', boxShadow: '0 0 22px #6c8cff55' }}>
          <span className="text-xl">⚡</span>
        </div>
        <div>
          <h1 className="text-lg font-extrabold leading-tight grad-text">AUTONOMOUS ARENA</h1>
          <p className="text-[11px]" style={{ color: DIM }}>AI-driven crypto trader · nothing hardcoded</p>
        </div>
      </div>
      <div className="flex items-center gap-2 ml-auto flex-wrap">
        <span className="chip flex items-center gap-2" style={{ color: running ? G : DIM }}>
          <span className={running ? 'live-dot' : 'idle-dot'}></span>{running ? 'LIVE' : 'IDLE'}
        </span>
        <span className="chip" style={{ color: '#ffd166', borderColor: '#3a3520' }}>PAPER</span>
        <span className="chip mono" style={{ color: ACCENT }}>{engine?.exchange || '—'}</span>
        <span className="chip mono" style={{ color: '#c6d2ea' }}>{engine?.num_agents ?? '—'} agents</span>
        <span className="chip mono" style={{ color: G }}>{engine?.gemini_keys ?? 0}× key</span>
        <span className="chip mono" style={{ color: '#c6d2ea' }}>universe {engine?.universe_size ?? 0}</span>
        <span className="chip mono" style={{ color: DIM }}>cycle {engine?.interval_minutes ?? '—'}m</span>
        <span className="chip mono" style={{ color: DIM }}>run #{engine?.runs ?? 0}</span>
      </div>
    </div>
  );
}

// ── universe heatmap ────────────────────────────────────────────────────────
function Heatmap({ universe }) {
  if (!universe || !universe.length) {
    return <div className="text-sm" style={{ color: DIM }}>Discovering universe…</div>;
  }
  const cells = universe.slice(0, 48);
  const cap = 12;
  return (
    <div className="grid gap-1.5" style={{ gridTemplateColumns: 'repeat(auto-fill,minmax(74px,1fr))' }}>
      {cells.map((u) => {
        const c = typeof u.pct_change === 'number' ? u.pct_change : 0;
        const t = Math.max(-1, Math.min(1, c / cap));
        const bg = t >= 0
          ? `rgba(0,230,168,${0.10 + 0.5 * t})`
          : `rgba(255,77,109,${0.10 + 0.5 * -t})`;
        return (
          <div key={u.symbol} title={`${u.base} 24h vol ${fmt(u.quote_volume,0)}`}
               className="rounded-lg px-2 py-1.5 text-center"
               style={{ background: bg, border: '1px solid #ffffff10' }}>
            <div className="mono text-[11px] font-bold">{u.base}</div>
            <div className="mono text-[10px]" style={{ color: c >= 0 ? G : R }}>{pct(c)}</div>
          </div>
        );
      })}
    </div>
  );
}

// ── agent card ──────────────────────────────────────────────────────────────
function AgentCard({ a, hist, selected, onClick }) {
  const up = a.pnl >= 0;
  const initial = a.equity - a.pnl;
  const deployed = Math.max(0, Math.min(100, ((a.equity - a.balance) / (a.equity || 1)) * 100));
  return (
    <div onClick={onClick}
      className={`glass glass-hover p-4 cursor-pointer fadein ${selected ? '' : ''}`}
      style={selected ? { borderColor: ACCENT, boxShadow: '0 0 0 1px ' + ACCENT + '66, 0 14px 40px #00000077' } : {}}>
      <div className="flex items-start justify-between gap-2">
        <div className="min-w-0">
          <p className="font-bold text-sm truncate">{a.strategy?.name || a.name}</p>
          <p className="text-[11px] truncate" style={{ color: DIM }}>{a.persona}</p>
        </div>
        <div className="text-right shrink-0">
          <p className="mono font-bold text-sm" style={{ color: pnlColor(a.pnl) }}>{pct(a.pnl_pct)}</p>
          <p className="mono text-[11px]" style={{ color: DIM }}>{usd(a.equity, 0)}</p>
        </div>
      </div>
      <div className="my-2 -mx-1"><Spark data={hist} color={up ? G : R} w={260} h={38} /></div>
      <div className="flex items-center justify-between text-[11px]" style={{ color: DIM }}>
        <span>{a.open_positions} open · {a.stats?.count || 0} closed</span>
        <span className="mono">WR {fmt(a.stats?.win_rate || 0, 0)}%</span>
      </div>
      <div className="bar-track h-1.5 mt-2"><div style={{ width: deployed + '%', height: '100%', background: 'linear-gradient(90deg,#6c8cff,#00e6a8)' }} /></div>
      <p className="text-[11px] mt-2 leading-snug" style={{ color: '#9fb0cc' }}>{short(a.strategy_memo || a.last_commentary, 120) || 'awaiting first decision…'}</p>
    </div>
  );
}

// ── positions table ─────────────────────────────────────────────────────────
function Positions({ rows }) {
  if (!rows || !rows.length) return <p className="text-sm py-6 text-center" style={{ color: DIM }}>No open positions.</p>;
  return (
    <div className="overflow-x-auto">
      <table className="w-full text-sm">
        <thead><tr className="text-left" style={{ color: DIM }}>
          {['Coin', 'Side', 'Entry', 'Now', 'Size', 'uPnL', '%', 'Stop', 'Target'].map((h) =>
            <th key={h} className="font-medium pb-2 px-2 text-[11px] uppercase tracking-wide">{h}</th>)}
          {rows[0]?.strategy_name && <th className="font-medium pb-2 px-2 text-[11px] uppercase tracking-wide">Agent</th>}
        </tr></thead>
        <tbody>
          {rows.map((p, i) => (
            <tr key={i} className="border-t" style={{ borderColor: '#161d30' }}>
              <td className="mono py-2 px-2 font-bold">{p.symbol}</td>
              <td className="px-2"><span className="chip mono" style={{ color: p.side === 'LONG' ? G : R, borderColor: (p.side === 'LONG' ? G : R) + '44' }}>{p.side}</span></td>
              <td className="mono px-2">{fmt(p.entry, 5)}</td>
              <td className="mono px-2">{fmt(p.current_price, 5)}</td>
              <td className="mono px-2">{usd(p.size_usd || (p.size * p.entry), 0)}</td>
              <td className="mono px-2 font-bold" style={{ color: pnlColor(p.unrealized_pnl) }}>{sign(p.unrealized_pnl)}</td>
              <td className="mono px-2" style={{ color: pnlColor(p.pnl_pct) }}>{pct(p.pnl_pct)}</td>
              <td className="mono px-2" style={{ color: R }}>{fmt(p.stop, 5)}</td>
              <td className="mono px-2" style={{ color: G }}>{fmt(p.target, 5)}</td>
              {p.strategy_name && <td className="px-2 text-[11px]" style={{ color: DIM }}>{p.strategy_name}</td>}
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

function Trades({ rows }) {
  if (!rows || !rows.length) return <p className="text-sm py-6 text-center" style={{ color: DIM }}>No closed trades yet.</p>;
  return (
    <div className="overflow-x-auto max-h-[320px] overflow-y-auto">
      <table className="w-full text-sm">
        <thead className="sticky top-0" style={{ background: '#0e1320' }}><tr className="text-left" style={{ color: DIM }}>
          {['Coin', 'Side', 'Entry', 'Exit', 'PnL', 'Agent'].map(h => <th key={h} className="font-medium pb-2 px-2 text-[11px] uppercase tracking-wide">{h}</th>)}
        </tr></thead>
        <tbody>
          {rows.map((t, i) => (
            <tr key={i} className="border-t" style={{ borderColor: '#161d30' }}>
              <td className="mono py-2 px-2 font-bold">{t.symbol}</td>
              <td className="mono px-2" style={{ color: t.side === 'LONG' ? G : R }}>{t.side}</td>
              <td className="mono px-2">{fmt(t.entry, 5)}</td>
              <td className="mono px-2">{fmt(t.exit, 5)}</td>
              <td className="mono px-2 font-bold" style={{ color: pnlColor(t.pnl) }}>{sign(t.pnl)}</td>
              <td className="px-2 text-[11px]" style={{ color: DIM }}>{t.strategy_name || ''}</td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

// ── activity log ────────────────────────────────────────────────────────────
function ActivityLog({ log }) {
  const ref = useRef(null);
  const lvlColor = (l) => l === 'TRADE' ? G : l === 'WARN' ? '#ffd166' : DIM;
  return (
    <div ref={ref} className="space-y-1.5 max-h-[360px] overflow-y-auto pr-1">
      {(!log || !log.length) && <p className="text-sm" style={{ color: DIM }}>No activity yet.</p>}
      {(log || []).slice().reverse().map((e, i) => (
        <div key={i} className="flex gap-2 text-[12px] leading-snug">
          <span className="mono shrink-0" style={{ color: '#33405e' }}>{(e.time || '').slice(11, 19)}</span>
          <span className="mono shrink-0 font-bold" style={{ color: lvlColor(e.level) }}>{(e.level || 'INFO')[0]}</span>
          <span style={{ color: '#aebcd6' }}>{e.msg}</span>
        </div>
      ))}
    </div>
  );
}

// ── equity area chart (lightweight-charts) ──────────────────────────────────
function EquityChart({ data }) {
  const elRef = useRef(null), chartRef = useRef(null), serRef = useRef(null);
  useEffect(() => {
    if (!elRef.current || chartRef.current) return;
    const chart = LightweightCharts.createChart(elRef.current, {
      layout: { background: { type: 'solid', color: 'transparent' }, textColor: '#5b6b86', fontFamily: 'JetBrains Mono' },
      grid: { vertLines: { color: '#141c2e' }, horzLines: { color: '#141c2e' } },
      rightPriceScale: { borderColor: '#1d2740' },
      timeScale: { borderColor: '#1d2740', timeVisible: true, secondsVisible: false },
      crosshair: { mode: 0 },
      height: 260,
    });
    const series = chart.addAreaSeries({ lineColor: ACCENT, topColor: 'rgba(108,140,255,0.35)', bottomColor: 'rgba(108,140,255,0.02)', lineWidth: 2 });
    chartRef.current = chart; serRef.current = series;
    const ro = new ResizeObserver(() => chart.applyOptions({ width: elRef.current.clientWidth }));
    ro.observe(elRef.current);
    return () => { ro.disconnect(); chart.remove(); chartRef.current = null; };
  }, []);
  useEffect(() => {
    if (serRef.current && data && data.length) {
      serRef.current.setData(data);
      if (chartRef.current) chartRef.current.timeScale().fitContent();
    }
  }, [data]);
  return <div ref={elRef} style={{ width: '100%', height: 260 }} />;
}

// ── candle chart ────────────────────────────────────────────────────────────
function CandleChart({ symbol }) {
  const elRef = useRef(null), chartRef = useRef(null), serRef = useRef(null);
  const [tf, setTf] = useState('4h');
  useEffect(() => {
    if (!elRef.current || chartRef.current) return;
    const chart = LightweightCharts.createChart(elRef.current, {
      layout: { background: { type: 'solid', color: 'transparent' }, textColor: '#5b6b86', fontFamily: 'JetBrains Mono' },
      grid: { vertLines: { color: '#141c2e' }, horzLines: { color: '#141c2e' } },
      rightPriceScale: { borderColor: '#1d2740' },
      timeScale: { borderColor: '#1d2740', timeVisible: true },
      height: 300,
    });
    serRef.current = chart.addCandlestickSeries({ upColor: G, downColor: R, borderUpColor: G, borderDownColor: R, wickUpColor: G, wickDownColor: R });
    chartRef.current = chart;
    const ro = new ResizeObserver(() => chart.applyOptions({ width: elRef.current.clientWidth }));
    ro.observe(elRef.current);
    return () => { ro.disconnect(); chart.remove(); chartRef.current = null; };
  }, []);
  const load = useCallback(async () => {
    if (!symbol) return;
    const d = await api(`/api/candles/${symbol}?tf=${tf}&limit=300`);
    if (d?.candles && serRef.current) serRef.current.setData(d.candles);
    if (chartRef.current) chartRef.current.timeScale().fitContent();
  }, [symbol, tf]);
  useEffect(() => { load(); const id = setInterval(load, 30000); return () => clearInterval(id); }, [load]);
  return (
    <div>
      <div className="flex items-center justify-between mb-2">
        <p className="mono font-bold">{symbol}<span style={{ color: DIM }}>/USDT</span></p>
        <div className="flex gap-1">{['1h', '4h', '1d', '1w'].map(t =>
          <button key={t} onClick={() => setTf(t)} className={`px-2.5 py-1 rounded-md text-xs mono ${tf === t ? 'tab-active' : 'tab-idle'}`}>{t}</button>)}</div>
      </div>
      <div ref={elRef} style={{ width: '100%', height: 300 }} />
    </div>
  );
}

// ── safety panel ────────────────────────────────────────────────────────────
function Safety({ s }) {
  if (!s) return null;
  const dd = s.daily_drawdown_pct || 0, lim = s.max_daily_drawdown_pct || 25;
  const w = Math.max(0, Math.min(100, (dd / lim) * 100));
  return (
    <div className="grid grid-cols-2 gap-3 text-sm">
      <div><p className="text-[11px]" style={{ color: DIM }}>MODE</p><p className="mono font-bold" style={{ color: '#ffd166' }}>{(s.mode || 'paper').toUpperCase()}</p></div>
      <div><p className="text-[11px]" style={{ color: DIM }}>KILL SWITCH</p><p className="mono font-bold" style={{ color: s.kill_switch ? R : G }}>{s.kill_switch ? 'ENGAGED' : 'OFF'}</p></div>
      <div className="col-span-2">
        <div className="flex justify-between text-[11px]" style={{ color: DIM }}><span>DAILY DRAWDOWN</span><span className="mono">{fmt(dd, 1)}% / {fmt(lim, 0)}%</span></div>
        <div className="bar-track h-2 mt-1"><div style={{ width: w + '%', height: '100%', background: s.drawdown_halt ? R : 'linear-gradient(90deg,#ffd166,#ff4d6d)' }} /></div>
        {s.drawdown_halt && <p className="text-[11px] mt-1" style={{ color: R }}>Breaker tripped — new entries halted today.</p>}
      </div>
      <div><p className="text-[11px]" style={{ color: DIM }}>MAX POSITIONS</p><p className="mono">{s.max_open_positions}</p></div>
      <div><p className="text-[11px]" style={{ color: DIM }}>MAX / TRADE</p><p className="mono">{s.max_alloc_pct_per_trade}%</p></div>
    </div>
  );
}

// ── agent detail ────────────────────────────────────────────────────────────
function AgentDetail({ a }) {
  const [positions, setPositions] = useState([]);
  const [trades, setTrades] = useState([]);
  useEffect(() => {
    if (!a) return;
    let alive = true;
    const load = async () => {
      const [p, t] = await Promise.all([api(`/api/arena/${a.strategy.id}/positions`), api(`/api/arena/${a.strategy.id}/trades`)]);
      if (!alive) return;
      setPositions(p?.positions || []); setTrades((t?.trades || []).slice().reverse());
    };
    load(); const id = setInterval(load, 5000); return () => { alive = false; clearInterval(id); };
  }, [a?.strategy?.id]);
  if (!a) return null;
  return (
    <div className="space-y-4 fadein">
      <div className="glass p-5">
        <div className="flex items-start justify-between flex-wrap gap-3">
          <div>
            <h3 className="text-xl font-extrabold">{a.strategy.name}</h3>
            <p className="text-sm" style={{ color: DIM }}>{a.persona}</p>
          </div>
          <div className="flex gap-5 text-right">
            <div><p className="text-[11px]" style={{ color: DIM }}>EQUITY</p><p className="mono text-lg font-bold">{usd(a.equity, 0)}</p></div>
            <div><p className="text-[11px]" style={{ color: DIM }}>PnL</p><p className="mono text-lg font-bold" style={{ color: pnlColor(a.pnl) }}>{sign(a.pnl, 0)} ({pct(a.pnl_pct)})</p></div>
            <div><p className="text-[11px]" style={{ color: DIM }}>WIN RATE</p><p className="mono text-lg font-bold">{fmt(a.stats?.win_rate || 0, 0)}%</p></div>
          </div>
        </div>
        <div className="mt-4">
          <p className="text-[11px] uppercase tracking-wider mb-1" style={{ color: ACCENT }}>🧠 Self-authored strategy memo (evolves every cycle)</p>
          <div className="rounded-xl p-3 text-[13px] leading-relaxed" style={{ background: '#0a0f1c', border: '1px solid #18203a', color: '#c6d2ea', maxHeight: 170, overflowY: 'auto' }}>
            {a.strategy_memo || 'No memo yet — first cycle pending.'}
          </div>
        </div>
        {a.watchlist?.length > 0 && (
          <div className="mt-3 flex flex-wrap gap-1.5 items-center">
            <span className="text-[11px]" style={{ color: DIM }}>WATCHING:</span>
            {a.watchlist.slice(0, 20).map(w => <span key={w} className="chip mono" style={{ color: '#c6d2ea' }}>{w}</span>)}
          </div>
        )}
        {a.last_commentary && <p className="text-[12px] mt-3" style={{ color: DIM }}>💬 {a.last_commentary}</p>}
      </div>
      <div className="grid lg:grid-cols-2 gap-4">
        <div className="glass p-5"><p className="font-bold mb-2">Open Positions</p><Positions rows={positions} /></div>
        <div className="glass p-5"><p className="font-bold mb-2">Activity</p><ActivityLog log={a.log} /></div>
      </div>
      <div className="glass p-5"><p className="font-bold mb-2">Closed Trades</p><Trades rows={trades} /></div>
    </div>
  );
}

// ── main app ────────────────────────────────────────────────────────────────
function App() {
  const [engine, setEngine] = useState(null);
  const [portfolio, setPortfolio] = useState(null);
  const [arena, setArena] = useState([]);
  const [universe, setUniverse] = useState([]);
  const [positions, setPositions] = useState([]);
  const [trades, setTrades] = useState([]);
  const [config, setConfig] = useState(null);
  const [tab, setTab] = useState('arena');
  const [selected, setSelected] = useState(null);
  const [chartSym, setChartSym] = useState('BTC');
  const histRef = useRef({});           // id -> [{time,value}]
  const [, force] = useState(0);

  const poll = useCallback(async () => {
    const [eng, pf, ar, uni, pos, tr, cfg] = await Promise.all([
      api('/api/engine'), api('/api/portfolio'), api('/api/arena'),
      api('/api/universe'), api('/api/positions'), api('/api/trades'), api('/api/config'),
    ]);
    if (eng) setEngine(eng);
    if (pf) setPortfolio(pf);
    if (uni) setUniverse(uni.universe || []);
    if (pos) setPositions(pos.positions || []);
    if (tr) setTrades(tr.trades || []);
    if (cfg) setConfig(cfg);
    if (ar?.arena) {
      setArena(ar.arena);
      const t = Math.floor(Date.now() / 1000);
      const h = histRef.current;
      const push = (k, v) => {
        if (!h[k]) h[k] = [];
        const last = h[k][h[k].length - 1];
        if (last && last.time === t) last.value = v; else h[k].push({ time: t, value: v });
        if (h[k].length > 400) h[k].shift();
      };
      let totEq = 0;
      ar.arena.forEach(a => { push(a.strategy.id, a.equity); totEq += a.equity; });
      push('__total', totEq);
      force(x => x + 1);
    }
  }, []);

  useEffect(() => { poll(); const id = setInterval(poll, 5000); return () => clearInterval(id); }, [poll]);

  const selectedAgent = useMemo(() => arena.find(a => a.strategy.id === selected) || null, [arena, selected]);
  const best = useMemo(() => arena.slice().sort((a, b) => b.pnl_pct - a.pnl_pct)[0], [arena]);
  const aggSafety = arena[0]?.safety;

  const TABS = [['arena', '🏟️ Arena'], ['positions', '📊 Positions'], ['history', '📜 History'], ['charts', '📈 Charts'], ['activity', '🛰️ Activity']];

  return (
    <div className="max-w-[1500px] mx-auto p-4 md:p-6 space-y-5">
      <Header engine={engine} config={config} />

      {/* KPI row */}
      <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-3">
        <Kpi big label="Total Equity" value={usd(portfolio?.equity || 0, 0)} color="#fff"
             sub={`from ${usd(portfolio?.initial_balance || 0, 0)}`} />
        <Kpi big label="Total PnL" value={sign(portfolio?.total_pnl || 0, 0)} color={pnlColor(portfolio?.total_pnl || 0)}
             sub={pct(portfolio?.total_pnl_pct || 0)} />
        <Kpi label="Win Rate" value={fmt(portfolio?.stats?.win_rate || 0, 0) + '%'} color={ACCENT}
             sub={`${portfolio?.stats?.count || 0} closed trades`} />
        <Kpi label="Open Positions" value={positions.length} sub={`${arena.length} agents trading`} />
        <Kpi label="Profit Purse" value={usd(portfolio?.profit_purse || 0, 0)} color={G} sub="banked gains" />
        <Kpi label="Top Agent" value={best ? short(best.strategy.name, 14) : '—'} color={G}
             sub={best ? pct(best.pnl_pct) : ''} />
      </div>

      {/* equity + universe */}
      <div className="grid lg:grid-cols-3 gap-4">
        <div className="glass p-5 lg:col-span-2">
          <div className="flex items-center justify-between mb-1">
            <p className="font-bold">Aggregate Equity</p>
            <p className="mono text-sm" style={{ color: pnlColor(portfolio?.total_pnl || 0) }}>{usd(portfolio?.equity || 0, 0)} · {pct(portfolio?.total_pnl_pct || 0)}</p>
          </div>
          <EquityChart data={histRef.current['__total'] || []} />
        </div>
        <div className="glass p-5">
          <div className="flex items-center justify-between mb-3">
            <p className="font-bold">Live Universe</p>
            <span className="chip mono" style={{ color: ACCENT }}>{engine?.universe_size || universe.length} coins</span>
          </div>
          <Heatmap universe={universe} />
        </div>
      </div>

      {/* tabs */}
      <div className="flex gap-2 flex-wrap">
        {TABS.map(([k, label]) =>
          <button key={k} onClick={() => setTab(k)} className={`px-4 py-2 rounded-xl text-sm font-medium ${tab === k ? 'tab-active' : 'tab-idle'}`}>{label}</button>)}
      </div>

      {tab === 'arena' && (
        <div className="space-y-4">
          <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-3">
            {arena.map(a => (
              <AgentCard key={a.strategy.id} a={a} hist={histRef.current[a.strategy.id]}
                         selected={selected === a.strategy.id}
                         onClick={() => setSelected(selected === a.strategy.id ? null : a.strategy.id)} />
            ))}
          </div>
          {selectedAgent
            ? <AgentDetail a={selectedAgent} />
            : <p className="text-center text-sm py-4" style={{ color: DIM }}>Click an agent to see its memo, positions, trades and activity.</p>}
        </div>
      )}

      {tab === 'positions' && <div className="glass p-5"><p className="font-bold mb-3">All Open Positions ({positions.length})</p><Positions rows={positions} /></div>}
      {tab === 'history' && <div className="glass p-5"><p className="font-bold mb-3">All Closed Trades</p><Trades rows={trades} /></div>}
      {tab === 'charts' && (
        <div className="grid lg:grid-cols-3 gap-4">
          <div className="glass p-5 lg:col-span-2"><CandleChart symbol={chartSym} /></div>
          <div className="glass p-5">
            <p className="font-bold mb-3">Pick a coin</p>
            <div className="grid grid-cols-3 gap-1.5 max-h-[320px] overflow-y-auto">
              {universe.slice(0, 36).map(u =>
                <button key={u.symbol} onClick={() => setChartSym(u.base)}
                  className={`px-2 py-1.5 rounded-lg text-xs mono ${chartSym === u.base ? 'tab-active' : 'tab-idle'}`}>{u.base}</button>)}
            </div>
          </div>
        </div>
      )}
      {tab === 'activity' && (
        <div className="grid lg:grid-cols-3 gap-4">
          <div className="glass p-5 lg:col-span-2"><p className="font-bold mb-3">Global Activity Feed</p><ActivityLog log={engine?.log} /></div>
          <div className="glass p-5"><p className="font-bold mb-3">🛡️ Safety</p><Safety s={aggSafety} /></div>
        </div>
      )}

      <p className="text-center text-[11px] py-3" style={{ color: '#2c3650' }}>
        Autonomous Arena · {engine?.gemini_keys || 0} Gemini key(s) · {engine?.exchange || '—'} · paper mode · the AI decides everything, code only enforces safety
      </p>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
