<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oscar — Trading Dashboard</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #0d0f17; color: #e2e8f0; font-family: ui-monospace, 'Cascadia Code', monospace; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #1a1d2e; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    .card { background: #141720; border: 1px solid #1e2433; border-radius: 10px; }
    .glow-green { text-shadow: 0 0 10px #00c08766; }
    .glow-red   { text-shadow: 0 0 10px #f2364566; }
    @keyframes pulse-dot { 0%,100%{opacity:1;} 50%{opacity:.3;} }
    .live-dot { animation: pulse-dot 1.4s ease-in-out infinite; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

const G = '#00c087';
const R = '#f23645';
const DIM = '#475569';

const api = (path) => fetch(path).then(r => r.json()).catch(() => null);

const fmt = (n, d = 2) => (n ?? 0).toLocaleString('en-US', { minimumFractionDigits: d, maximumFractionDigits: d });
const fmtSign = (n, d = 2) => (n >= 0 ? '+' : '') + fmt(n, d);
const fmtDollar = (n, d = 2) => '$' + fmt(n, d);
const fmtPct = (n) => fmtSign(n, 2) + '%';

// ── Mini stat card ──────────────────────────────────────────────────────────
function Stat({ label, value, color, sub }) {
  return (
    <div className="card p-3">
      <p className="text-xs text-slate-500 mb-1">{label}</p>
      <p className="text-lg font-bold" style={color ? { color } : {}}>{value}</p>
      {sub && <p className="text-xs mt-0.5" style={{ color: DIM }}>{sub}</p>}
    </div>
  );
}

// ── Price ticker bar ────────────────────────────────────────────────────────
function Ticker({ prices }) {
  if (!prices) return null;
  const items = Object.entries(prices).filter(([, d]) => d?.price);
  return (
    <div className="flex gap-5 text-xs overflow-x-auto">
      {items.map(([sym, d]) => {
        const color = d.bias === 'BULLISH' ? G : d.bias === 'BEARISH' ? R : DIM;
        return (
          <span key={sym} className="flex items-center gap-1.5 shrink-0">
            <span className="text-slate-500">{sym}</span>
            <span className="font-bold">{fmtDollar(d.price, d.price < 1 ? 4 : 2)}</span>
            <span style={{ color }} className="text-[10px]">
              {d.bias === 'BULLISH' ? '▲' : d.bias === 'BEARISH' ? '▼' : '─'}
            </span>
          </span>
        );
      })}
    </div>
  );
}

// ── Sidebar ─────────────────────────────────────────────────────────────────
function Sidebar({ portfolio, engine, selectedStrategy, setSelectedStrategy, strategies }) {
  if (!portfolio) return (
    <div className="w-52 border-r border-slate-800/60 p-4 space-y-3">
      <div className="text-[10px] text-slate-500 uppercase tracking-widest mb-2">Select Engine</div>
      <div className="h-8 bg-slate-800/40 rounded animate-pulse mb-3" />
      {[1,2,3].map(i => <div key={i} className="card h-16 animate-pulse" />)}
    </div>
  );

  const pnl = portfolio.total_pnl ?? 0;
  const pnlColor = pnl >= 0 ? G : R;
  const st = portfolio.stats ?? {};

  // Find active strategy details if specific
  const activeStrat = (strategies ?? []).find(s => s.id === selectedStrategy);

  return (
    <aside className="w-52 border-r border-slate-800/60 p-3 overflow-y-auto flex flex-col gap-3">
      {/* Strategy Selector on top */}
      <div>
        <label className="text-[10px] text-slate-500 uppercase tracking-widest block mb-1.5">Strategy Scope</label>
        <select
          value={selectedStrategy}
          onChange={(e) => setSelectedStrategy(e.target.value)}
          className="w-full bg-[#141720] border border-slate-800 hover:border-slate-700 text-white rounded px-2 py-1.5 text-xs font-bold outline-none cursor-pointer">
          <option value="all">🌍 All Strategies Combined</option>
          {(strategies ?? []).map(s => (
            <option key={s.id} value={s.id}>🤖 {s.name}</option>
          ))}
        </select>
      </div>

      <div className="card p-3">
        <p className="text-[10px] text-slate-500 uppercase tracking-widest mb-2">Account Metrics</p>
        <p className="text-xs text-slate-500">Total Equity</p>
        <p className="text-2xl font-bold mb-2">{fmtDollar(portfolio.equity)}</p>
        <div className="grid grid-cols-3 gap-1 py-2 text-[10px] border-t border-slate-800/50">
          <div>
            <p className="text-slate-500">Free</p>
            <p className="font-bold text-slate-200">{fmtDollar(portfolio.balance)}</p>
          </div>
          <div>
            <p className="text-slate-500">In Purse</p>
            <p className="font-bold text-amber-400">💰{fmtDollar(portfolio.profit_purse ?? 0)}</p>
          </div>
          <div>
            <p className="text-slate-500">Started</p>
            <p className="font-bold text-slate-200">{fmtDollar(portfolio.initial_balance)}</p>
          </div>
        </div>
      </div>

      <div className="card p-3">
        <p className="text-xs text-slate-500">Realized P&amp;L</p>
        <p className="text-xl font-bold" style={{ color: pnlColor }}>
          {fmtSign(pnl)}
        </p>
        <p className="text-xs" style={{ color: pnlColor }}>{fmtPct(portfolio.total_pnl_pct)}</p>
      </div>

      {st.count > 0 && (
        <div className="card p-3 space-y-1 text-xs">
          <p className="text-[10px] text-slate-500 uppercase tracking-widest mb-1.5">Performance</p>
          <div className="flex justify-between">
            <span className="text-slate-500">Win Rate</span>
            <span>{fmt(st.win_rate, 1)}%</span>
          </div>
          <div className="flex justify-between">
            <span className="text-slate-500">Trades</span>
            <span className="text-slate-300">{st.wins}W / {st.losses}L</span>
          </div>
        </div>
      )}

      {/* Info card for active strategy */}
      {activeStrat ? (
        <div className="card p-3 text-xs space-y-1">
          <p className="text-[10px] text-slate-500 uppercase tracking-widest mb-1">Rules</p>
          <p className="font-bold text-slate-300">{activeStrat.name}</p>
          <StrategyBadge style={activeStrat.style} />
          <p className="text-slate-500 mt-2">
            Long RSI: {activeStrat.long_rsi_min}–{activeStrat.long_rsi_max}
          </p>
          <p className="text-slate-500">
            Short RSI: {activeStrat.short_rsi_min}–{activeStrat.short_rsi_max}
          </p>
          <p className="text-slate-500">
            EMA Filter: {activeStrat.require_ema_filter ? '✓ Active' : '✗ Bypassed'}
          </p>
          <p className="text-slate-500">
            4H Struct: {activeStrat.require_structure ? '✓ Active' : '✗ Bypassed'}
          </p>
          <p className="text-slate-400 mt-1.5 font-bold">
            💰 {(activeStrat.risk_pct * 100).toFixed(1)}% risk | {activeStrat.rr_ratio}:1 R/R
          </p>
        </div>
      ) : (
        <div className="card p-3 text-xs space-y-1">
          <p className="text-[10px] text-slate-500 uppercase tracking-widest mb-1">Arena Stats</p>
          <p className="text-slate-400 font-bold">5 Strategies Live</p>
          <p className="text-slate-500">Each strategy runs with an independent $10,000 account balance.</p>
        </div>
      )}
    </aside>
  );
}

// ── Candlestick Chart ───────────────────────────────────────────────────────
function CandleChart({ symbol }) {
  const containerRef = useRef(null);
  const chartRef = useRef(null);
  const seriesRef = useRef(null);
  const [tf, setTf] = useState('4h');

  useEffect(() => {
    if (!containerRef.current || chartRef.current) return;
    const chart = LightweightCharts.createChart(containerRef.current, {
      layout: { background: { color: '#141720' }, textColor: '#94a3b8' },
      grid: { vertLines: { color: '#1e2433' }, horzLines: { color: '#1e2433' } },
      crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
      rightPriceScale: { borderColor: '#1e2433' },
      timeScale: { borderColor: '#1e2433', timeVisible: true, secondsVisible: false },
      width: containerRef.current.clientWidth,
      height: 380,
    });
    const cs = chart.addCandlestickSeries({
      upColor: G, downColor: R,
      borderUpColor: G, borderDownColor: R,
      wickUpColor: G, wickDownColor: R,
    });
    chartRef.current = chart;
    seriesRef.current = cs;

    const onResize = () => {
      if (containerRef.current && chartRef.current) {
        chartRef.current.applyOptions({ width: containerRef.current.clientWidth });
      }
    };
    window.addEventListener('resize', onResize);
    return () => {
      window.removeEventListener('resize', onResize);
      chart.remove();
      chartRef.current = null;
    };
  }, []);

  const fetchCandles = useCallback(async () => {
    const sym = symbol.replace('/', '');
    const data = await api(`/api/candles/${sym}?tf=${tf}&limit=300`);
    if (seriesRef.current && data?.candles?.length) {
      seriesRef.current.setData(data.candles);
      chartRef.current?.timeScale().fitContent();
    }
  }, [symbol, tf]);

  useEffect(() => {
    fetchCandles();
    const id = setInterval(fetchCandles, 30_000);
    return () => clearInterval(id);
  }, [fetchCandles]);

  return (
    <div>
      <div className="flex gap-1.5 mb-3">
        {['1h', '4h', '1d'].map(t => (
          <button key={t} onClick={() => setTf(t)}
            className={`px-2.5 py-1 rounded text-xs font-bold transition-colors
              ${tf === t ? 'bg-blue-600 text-white' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'}`}>
            {t.toUpperCase()}
          </button>
        ))}
      </div>
      <div ref={containerRef} />
    </div>
  );
}

// ── Charts Tab ───────────────────────────────────────────────────────────────
const SYMBOLS = ['BTC/USDT','ETH/USDT','SOL/USDT','LINK/USDT','AVAX/USDT','SUI/USDT'];

function ChartsTab({ prices }) {
  const [active, setActive] = useState('BTC/USDT');
  const base = active.replace('/USDT', '');
  const pd = prices?.[base];

  return (
    <div>
      <div className="flex gap-1.5 mb-4 flex-wrap">
        {SYMBOLS.map(s => {
          const b = s.replace('/USDT', '');
          const bias = prices?.[b]?.bias;
          const dot = bias === 'BULLISH' ? '🟢' : bias === 'BEARISH' ? '🔴' : '🟡';
          return (
            <button key={s} onClick={() => setActive(s)}
              className={`px-3 py-1.5 rounded text-xs font-bold flex items-center gap-1 transition-colors
                ${active === s ? 'bg-blue-600 text-white' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'}`}>
              {dot} {b}
            </button>
          );
        })}
      </div>
      <div className="card p-4">
        <div className="flex items-baseline gap-3 mb-4">
          <p className="font-bold text-lg">{active}</p>
          {pd?.price && (
            <p className="text-xl font-bold" style={{ color: pd.bias === 'BULLISH' ? G : pd.bias === 'BEARISH' ? R : '#94a3b8' }}>
              {fmtDollar(pd.price, pd.price < 1 ? 4 : 2)}
            </p>
          )}
          {pd?.bias && (
            <span className="text-xs px-2 py-0.5 rounded font-bold"
              style={{ background: pd.bias === 'BULLISH' ? '#00c08722' : pd.bias === 'BEARISH' ? '#f2364522' : '#47556922',
                       color: pd.bias === 'BULLISH' ? G : pd.bias === 'BEARISH' ? R : DIM }}>
              {pd.bias}
            </span>
          )}
        </div>
        <CandleChart key={active} symbol={active} />
      </div>
    </div>
  );
}

// ── Positions Tab ────────────────────────────────────────────────────────────
function PositionsTab({ positions }) {
  if (!positions?.length) return (
    <div className="card p-12 text-center">
      <p className="text-3xl mb-3">📋</p>
      <p className="text-slate-500">No open positions</p>
      <p className="text-xs text-slate-600 mt-1">The engines will enter trades automatically when setups appear</p>
    </div>
  );

  // Group positions by strategy
  const grouped = {};
  positions.forEach(p => {
    const key = p.strategy_name || "General";
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(p);
  });

  return (
    <div className="space-y-6">
      {Object.entries(grouped).map(([stratName, list]) => (
        <div key={stratName} className="space-y-2">
          <h3 className="text-xs font-bold text-slate-400 uppercase tracking-wider pl-1 flex items-center gap-1.5">
            <span className="inline-block w-2 h-2 rounded-full bg-blue-500 animate-pulse" />
            {stratName} ({list.length})
          </h3>
          <div className="card overflow-hidden">
            <table className="w-full text-xs">
              <thead>
                <tr className="border-b border-slate-800 text-slate-500">
                  {['Symbol','Side','Entry','Current','Stop','Target','Unreal P&L','Size','Opened'].map(h =>
                    <th key={h} className="px-4 py-3 text-left font-medium">{h}</th>
                  )}
                </tr>
              </thead>
              <tbody>
                {list.map(p => {
                  const pnl = p.unrealized_pnl ?? 0;
                  return (
                    <tr key={`${stratName}-${p.symbol}`} className="border-b border-slate-800/50 hover:bg-slate-800/30">
                      <td className="px-4 py-3 font-bold text-slate-200">{p.symbol}</td>
                      <td className="px-4 py-3">
                        <span className="px-2 py-0.5 rounded font-bold"
                          style={{ background: p.side === 'LONG' ? '#00c08720' : '#f2364520',
                                   color: p.side === 'LONG' ? G : R }}>
                          {p.side}
                        </span>
                      </td>
                      <td className="px-4 py-3 font-mono">{fmtDollar(p.entry, 4)}</td>
                      <td className="px-4 py-3 font-mono font-bold">{fmtDollar(p.current_price, 4)}</td>
                      <td className="px-4 py-3 font-mono" style={{ color: R }}>{fmtDollar(p.stop, 4)}</td>
                      <td className="px-4 py-3 font-mono" style={{ color: G }}>{fmtDollar(p.target, 4)}</td>
                      <td className="px-4 py-3 font-mono font-bold" style={{ color: pnl >= 0 ? G : R }}>
                        {fmtSign(pnl)} ({fmtPct(p.pnl_pct)})
                      </td>
                      <td className="px-4 py-3 font-mono text-slate-400">{(p.size ?? 0).toFixed(5)}</td>
                      <td className="px-4 py-3 text-slate-500">{(p.opened_at ?? '').slice(0, 16).replace('T', ' ')}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      ))}
    </div>
  );
}

// ── History Tab ───────────────────────────────────────────────────────────────
function HistoryTab({ trades }) {
  if (!trades?.length) return (
    <div className="card p-12 text-center">
      <p className="text-3xl mb-3">📜</p>
      <p className="text-slate-500">No closed trades yet</p>
    </div>
  );

  return (
    <div className="card overflow-hidden">
      <table className="w-full text-xs">
        <thead>
          <tr className="border-b border-slate-800 text-slate-500">
            {['Result','Symbol','Side','Entry','Exit','P&L','P&L %','Strategy','Closed'].map(h =>
              <th key={h} className="px-4 py-3 text-left font-medium">{h}</th>
            )}
          </tr>
        </thead>
        <tbody>
          {trades.map((t, i) => {
            const pnl = t.pnl ?? 0;
            const cost = (t.entry ?? 0) * (t.size ?? 0);
            const pnlPct = cost ? (pnl / cost * 100) : 0;
            return (
              <tr key={i} className="border-b border-slate-800/50 hover:bg-slate-800/30">
                <td className="px-4 py-3 text-base">{pnl >= 0 ? '✅' : '🟥'}</td>
                <td className="px-4 py-3 font-bold text-slate-200">{t.symbol}</td>
                <td className="px-4 py-3">
                  <span className="px-2 py-0.5 rounded font-bold"
                    style={{ background: t.side === 'LONG' ? '#00c08720' : '#f2364520',
                             color: t.side === 'LONG' ? G : R }}>
                    {t.side}
                  </span>
                </td>
                <td className="px-4 py-3 font-mono">{fmtDollar(t.entry, 4)}</td>
                <td className="px-4 py-3 font-mono">{fmtDollar(t.exit, 4)}</td>
                <td className="px-4 py-3 font-mono font-bold" style={{ color: pnl >= 0 ? G : R }}>
                  {fmtSign(pnl)}
                </td>
                <td className="px-4 py-3 font-mono" style={{ color: pnl >= 0 ? G : R }}>
                  {fmtPct(pnlPct)}
                </td>
                <td className="px-4 py-3">
                  {t.strategy_name ? (
                    <span className="px-1.5 py-0.5 rounded text-[10px] bg-slate-800 text-slate-400 font-medium">
                      {t.strategy_name}
                    </span>
                  ) : (
                    <span className="text-slate-600">—</span>
                  )}
                </td>
                <td className="px-4 py-3 text-slate-500">
                  {(t.closed_at ?? '').slice(0, 16).replace('T', ' ')}
                </td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

// ── Engine Tab ────────────────────────────────────────────────────────────────
function EngineTab({ engine, onToggle, onModeToggle }) {
  if (!engine) return <div className="card h-32 animate-pulse" />;
  const unleashed = engine.unleashed ?? false;

  return (
    <div className="space-y-4">
      {/* Status row */}
      <div className="card p-4">
        <div className="flex items-center justify-between mb-4">
          <div className="flex items-center gap-3">
            <div className={`w-3 h-3 rounded-full ${engine.running ? 'live-dot bg-emerald-400' : 'bg-red-500'}`} />
            <span className="font-bold text-sm">{engine.running ? 'Engine Running' : 'Engine Paused'}</span>
            <span className="text-xs text-slate-500">• Every {engine.interval_minutes} min</span>
          </div>
          <button onClick={onToggle}
            className={`px-4 py-1.5 rounded text-xs font-bold transition-colors
              ${engine.running
                ? 'bg-red-900/40 text-red-400 hover:bg-red-900/60 border border-red-900/50'
                : 'bg-emerald-900/40 text-emerald-400 hover:bg-emerald-900/60 border border-emerald-900/50'}`}>
            {engine.running ? 'Pause Engine' : 'Start Engine'}
          </button>
        </div>
        <div className="grid grid-cols-3 gap-4 text-xs">
          <div>
            <p className="text-slate-500 mb-1">Scans Completed</p>
            <p className="font-bold text-lg">{engine.runs}</p>
          </div>
          <div>
            <p className="text-slate-500 mb-1">Last Run</p>
            <p>{engine.last_run ? engine.last_run.slice(0, 16).replace('T', ' ') + ' UTC' : '—'}</p>
          </div>
          <div>
            <p className="text-slate-500 mb-1">Next Run</p>
            <p>{engine.next_run ? engine.next_run.slice(0, 16).replace('T', ' ') + ' UTC' : '—'}</p>
          </div>
        </div>
      </div>

      {/* UNLEASH TOGGLE */}
      <div className={`card p-5 transition-all duration-300 ${unleashed
        ? 'border-orange-500/60 shadow-[0_0_24px_#f97316_22]'
        : 'border-slate-800'}`}>
        <div className="flex items-center justify-between">
          <div>
            <div className="flex items-center gap-2 mb-1">
              <span className="text-lg">{unleashed ? '🔥' : '🔒'}</span>
              <span className={`font-bold text-sm tracking-wide ${unleashed ? 'text-orange-400' : 'text-slate-300'}`}>
                {unleashed ? 'UNLEASHED MODE' : 'Restricted Mode'}
              </span>
            </div>
            <p className="text-xs text-slate-500 max-w-md">
              {unleashed
                ? 'Oscar is completely free — Gemini AI decides every entry, exit, size, stop and target. No rules. No limits. Pure instinct.'
                : 'Fixed rules: 1% risk per trade, 2:1 R/R, structural stop. Deterministic and safe.'}
            </p>
          </div>

          {/* Toggle switch */}
          <button onClick={onModeToggle}
            className={`relative w-14 h-7 rounded-full transition-all duration-300 focus:outline-none
              ${unleashed ? 'bg-orange-500' : 'bg-slate-700'}`}>
            <span className={`absolute top-1 w-5 h-5 rounded-full bg-white shadow transition-all duration-300
              ${unleashed ? 'left-8' : 'left-1'}`} />
          </button>
        </div>

        {unleashed && (
          <div className="mt-4 p-3 rounded-lg bg-orange-950/30 border border-orange-900/40">
            <p className="text-xs text-orange-400/80 font-mono">
              ⚡ Oscar reads live RSI, EMAs, 4H structure for all 6 coins then sends his full analysis to Gemini.
              Gemini decides what to buy, what to sell, how much, and why — completely on its own terms.
              Every decision is logged and sent to your Telegram.
            </p>
          </div>
        )}
      </div>

      {/* Activity Log */}
      <div className="card p-4">
        <p className="text-[10px] text-slate-500 uppercase tracking-widest mb-3">Activity Log</p>
        <div className="space-y-0.5 max-h-72 overflow-y-auto font-mono">
          {[...(engine.log ?? [])].reverse().map((entry, i) => (
            <div key={i} className="flex gap-3 text-xs py-0.5">
              <span className="text-slate-700 shrink-0 w-16">{(entry.time ?? '').slice(11, 19)}</span>
              <span className={
                entry.level === 'TRADE'
                  ? (entry.msg?.includes('[UNLEASHED]') ? 'text-orange-400' : 'text-yellow-400')
                  : entry.level === 'ERROR' ? 'text-red-400' : 'text-slate-500'
              }>{entry.msg}</span>
            </div>
          ))}
          {(!engine.log?.length) && (
            <p className="text-slate-700 text-xs py-4">Waiting for first scan…</p>
          )}
        </div>
      </div>
    </div>
  );
}

// ── Arena Tab ─────────────────────────────────────────────────────────────────
const STYLE_COLORS = {
  trend_follow: '#60a5fa',
  reversal:     '#f472b6',
  momentum:     '#34d399',
  aggressive:   '#fb923c',
  breakout:     '#a78bfa',
};

function StrategyBadge({ style }) {
  const color = STYLE_COLORS[style] ?? '#94a3b8';
  return (
    <span className="px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-widest"
      style={{ background: color + '22', color, border: `1px solid ${color}44` }}>
      {style?.replace('_', ' ')}
    </span>
  );
}

function StrategyParams({ strategy }) {
  const items = [
    { label: 'Long RSI',  value: `${strategy.long_rsi_min}–${strategy.long_rsi_max}` },
    { label: 'Short RSI', value: `${strategy.short_rsi_min}–${strategy.short_rsi_max}` },
    { label: 'EMA Filter', value: strategy.require_ema_filter ? '✓ On' : '✗ Off' },
    { label: '4H Structure', value: strategy.require_structure ? '✓ On' : '✗ Off' },
    { label: 'Risk/Trade', value: `${(strategy.risk_pct * 100).toFixed(1)}%` },
    { label: 'R:R Ratio',  value: `${strategy.rr_ratio}:1` },
  ];
  return (
    <div className="grid grid-cols-3 gap-2 mt-3">
      {items.map(({ label, value }) => (
        <div key={label} className="bg-slate-900/50 rounded p-2">
          <p className="text-[10px] text-slate-500 mb-0.5">{label}</p>
          <p className="text-xs font-bold text-slate-300">{value}</p>
        </div>
      ))}
    </div>
  );
}

function ArenaCard({ item, selected, onClick }) {
  const pnlColor = item.pnl >= 0 ? '#00c087' : '#f23645';
  const strat = item.strategy;
  return (
    <button onClick={onClick}
      className={`w-full text-left card p-4 transition-all duration-200
        ${selected ? 'border-blue-500/70 shadow-[0_0_16px_#3b82f620]' : 'hover:border-slate-600'}`}>
      <div className="flex items-start justify-between mb-2">
        <div>
          <p className="font-bold text-sm text-white mb-1">{strat.name}</p>
          <StrategyBadge style={strat.style} />
        </div>
        <div className="text-right">
          <p className="font-bold text-sm" style={{ color: pnlColor }}>
            {item.pnl >= 0 ? '+' : ''}${fmt(item.pnl)}
          </p>
          <p className="text-[11px]" style={{ color: pnlColor }}>
            {fmtPct(item.pnl_pct)}
          </p>
        </div>
      </div>
      <div className="flex gap-3 text-[11px] text-slate-500">
        <span>Equity: <b className="text-slate-300">${fmt(item.equity)}</b></span>
        <span>Positions: <b className="text-slate-300">{item.open_positions}</b></span>
        <span>Trades: <b className="text-slate-300">{item.stats?.count ?? 0}</b></span>
        <span>WR: <b className="text-slate-300">{item.stats?.win_rate?.toFixed(0) ?? '—'}%</b></span>
      </div>
      {/* Equity bar */}
      <div className="mt-3 h-1 rounded-full bg-slate-800 overflow-hidden">
        <div className="h-full rounded-full transition-all duration-500"
          style={{
            width: `${Math.min(100, Math.max(0, item.equity / 100))}%`,
            background: item.pnl >= 0 ? '#00c087' : '#f23645',
          }} />
      </div>
    </button>
  );
}

function ArenaDetail({ item }) {
  const [positions, setPositions] = useState([]);
  const [trades, setTrades]       = useState([]);
  const strat = item.strategy;

  useEffect(() => {
    const load = async () => {
      const [pos, tr] = await Promise.all([
        api(`/api/arena/${strat.id}/positions`),
        api(`/api/arena/${strat.id}/trades`),
      ]);
      if (pos?.positions) setPositions(pos.positions);
      if (tr?.trades)     setTrades(tr.trades);
    };
    load();
    const id = setInterval(load, 10_000);
    return () => clearInterval(id);
  }, [strat.id]);

  const pnlColor = item.pnl >= 0 ? '#00c087' : '#f23645';

  return (
    <div className="space-y-4">
      {/* Header */}
      <div className="card p-5">
        <div className="flex items-start justify-between mb-3">
          <div>
            <div className="flex items-center gap-2 mb-1">
              <h2 className="font-bold text-white">{strat.name}</h2>
              <StrategyBadge style={strat.style} />
            </div>
            <p className="text-xs text-slate-400 max-w-lg">{strat.description}</p>
          </div>
          <div className="text-right">
            <p className="text-2xl font-bold" style={{ color: pnlColor }}>
              {item.pnl >= 0 ? '+' : ''}${fmt(item.pnl)}
            </p>
            <p className="text-xs text-slate-500">vs $10,000 start</p>
          </div>
        </div>
        <div className="grid grid-cols-5 gap-3 mb-4">
          <div className="card p-3"><p className="text-xs text-slate-500 mb-1">Equity</p><p className="font-bold">${fmt(item.equity)}</p></div>
          <div className="card p-3"><p className="text-xs text-slate-500 mb-1">Free Balance</p><p className="font-bold">${fmt(item.balance)}</p></div>
          <div className="card p-3 border border-amber-500/10"><p className="text-xs text-amber-500 font-bold mb-1">💰 Profit Purse</p><p className="font-bold text-amber-400">${fmt(item.profit_purse ?? 0)}</p></div>
          <div className="card p-3"><p className="text-xs text-slate-500 mb-1">Win Rate</p>
            <p className="font-bold">{item.stats?.count ? item.stats.win_rate.toFixed(0) + '%' : '—'}</p></div>
          <div className="card p-3"><p className="text-xs text-slate-500 mb-1">Scans Done</p><p className="font-bold">{item.runs}</p></div>
        </div>
        <p className="text-[10px] text-slate-600 uppercase tracking-widest mb-2">Strategy Parameters</p>
        <StrategyParams strategy={strat} />
      </div>

      {/* Open Positions */}
      {positions.length > 0 && (
        <div className="card p-4">
          <p className="text-[10px] text-slate-500 uppercase tracking-widest mb-3">Open Positions</p>
          <div className="space-y-2">
            {positions.map(pos => {
              const pnl = pos.unrealized_pnl;
              const color = pnl >= 0 ? G : R;
              return (
                <div key={pos.symbol} className="flex items-center justify-between text-xs py-1.5 border-b border-slate-800/50 last:border-0">
                  <div className="flex items-center gap-3">
                    <span className="font-bold">{pos.symbol}</span>
                    <span className="px-1.5 py-0.5 rounded text-[10px] font-bold"
                      style={{ background: pos.side === 'LONG' ? '#00c08722' : '#f2364522',
                                color: pos.side === 'LONG' ? G : R }}>{pos.side}</span>
                  </div>
                  <div className="flex gap-5 text-slate-400">
                    <span>@ ${fmt(pos.entry, 4)}</span>
                    <span>→ ${fmt(pos.current_price, 4)}</span>
                    <span style={{ color }}>{pnl >= 0 ? '+' : ''}${fmt(pnl)}</span>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
      {positions.length === 0 && (
        <div className="card p-4 text-center text-slate-600 text-xs">No open positions</div>
      )}

      {/* Recent Trades */}
      {trades.length > 0 && (
        <div className="card p-4">
          <p className="text-[10px] text-slate-500 uppercase tracking-widest mb-3">
            Trade History ({trades.length})
          </p>
          <div className="space-y-1 max-h-48 overflow-y-auto">
            {[...trades].reverse().map((t, i) => {
              const color = t.pnl >= 0 ? G : R;
              return (
                <div key={i} className="flex items-center justify-between text-xs py-1 border-b border-slate-800/40 last:border-0">
                  <div className="flex items-center gap-2">
                    <span>{t.symbol}</span>
                    <span style={{ color: t.side === 'LONG' ? G : R }}>{t.side}</span>
                    <span className="text-slate-600">@ ${fmt(t.entry, 4)} → ${fmt(t.exit, 4)}</span>
                  </div>
                  <span style={{ color }}>{t.pnl >= 0 ? '+' : ''}${fmt(t.pnl)}</span>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* Activity Log */}
      <div className="card p-4">
        <p className="text-[10px] text-slate-500 uppercase tracking-widest mb-3">Activity Log</p>
        <div className="space-y-0.5 max-h-40 overflow-y-auto font-mono">
          {[...(item.log ?? [])].reverse().map((entry, i) => (
            <div key={i} className="flex gap-3 text-xs py-0.5">
              <span className="text-slate-700 shrink-0 w-16">{(entry.time ?? '').slice(11, 19)}</span>
              <span className={entry.level === 'TRADE' ? 'text-yellow-400' : 'text-slate-500'}>{entry.msg}</span>
            </div>
          ))}
          {(!item.log?.length) && <p className="text-slate-700 text-xs py-2">Waiting for first scan…</p>}
        </div>
      </div>
    </div>
  );
}

function ArenaTab({ arena }) {
  const [selected, setSelected] = useState(0);

  if (!arena.length) {
    return (
      <div className="card p-8 text-center">
        <p className="text-slate-500 text-sm mb-2">Generating strategies…</p>
        <p className="text-slate-700 text-xs">Oscar is designing 5 unique trading approaches via Gemini. Refresh in a moment.</p>
      </div>
    );
  }

  const sorted = [...arena].sort((a, b) => b.pnl - a.pnl);
  const leaderIdx = sorted.map(s => arena.findIndex(a => a.strategy.id === s.strategy.id));

  return (
    <div className="space-y-5">
      {/* Leaderboard header */}
      <div className="card p-4">
        <p className="text-[10px] text-slate-500 uppercase tracking-widest mb-3">🏆 Leaderboard</p>
        <div className="space-y-2">
          {sorted.map((item, rank) => {
            const pnlColor = item.pnl >= 0 ? G : R;
            const medals = ['🥇', '🥈', '🥉', '4️⃣', '5️⃣'];
            return (
              <button key={item.strategy.id}
                onClick={() => setSelected(arena.findIndex(a => a.strategy.id === item.strategy.id))}
                className="w-full flex items-center gap-3 text-xs hover:bg-slate-800/30 rounded px-2 py-1.5 transition-colors">
                <span className="text-base w-6 shrink-0">{medals[rank]}</span>
                <span className="font-bold text-slate-200 w-36 text-left truncate">{item.strategy.name}</span>
                <StrategyBadge style={item.strategy.style} />
                <div className="flex-1 mx-3 h-1.5 rounded-full bg-slate-800 overflow-hidden">
                  <div className="h-full rounded-full"
                    style={{ width: `${Math.min(100, Math.max(2, 50 + item.pnl_pct * 2))}%`, background: pnlColor }} />
                </div>
                <span className="font-bold w-24 text-right" style={{ color: pnlColor }}>
                  {item.pnl >= 0 ? '+' : ''}${fmt(item.pnl)} ({fmtPct(item.pnl_pct)})
                </span>
              </button>
            );
          })}
        </div>
      </div>

      {/* Strategy selector + detail */}
      <div className="flex gap-4">
        {/* Left: strategy cards */}
        <div className="w-72 shrink-0 space-y-2">
          {arena.map((item, i) => (
            <ArenaCard key={item.strategy.id} item={item} selected={selected === i} onClick={() => setSelected(i)} />
          ))}
        </div>
        {/* Right: detail panel */}
        <div className="flex-1 min-w-0">
          <ArenaDetail item={arena[selected]} />
        </div>
      </div>
    </div>
  );
}

// ── App Root ───────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState('arena');
  const [selectedStrategy, setSelectedStrategy] = useState('all');
  const [portfolio, setPortfolio] = useState(null);
  const [positions, setPositions] = useState([]);
  const [trades, setTrades] = useState([]);
  const [prices, setPrices] = useState(null);
  const [engine, setEngine] = useState(null);
  const [arena, setArena] = useState([]);
  const [strategies, setStrategies] = useState([]);
  const [lastUpdated, setLastUpdated] = useState(null);

  const refresh = useCallback(async () => {
    const [port, pos, tr, pr, eng, ar, strats] = await Promise.all([
      api(`/api/portfolio?sid=${selectedStrategy}`),
      api(`/api/positions?sid=${selectedStrategy}`),
      api(`/api/trades?sid=${selectedStrategy}`),
      api('/api/prices'),
      api('/api/engine'),
      api('/api/arena'),
      api('/api/arena/strategies'),
    ]);
    if (port) setPortfolio(port);
    if (pos?.positions) setPositions(pos.positions);
    if (tr?.trades)     setTrades(tr.trades);
    if (pr?.prices)     setPrices(pr.prices);
    if (eng)            setEngine(eng);
    if (ar?.arena)      setArena(ar.arena);
    if (strats?.strategies) setStrategies(strats.strategies);
    setLastUpdated(new Date().toLocaleTimeString());
  }, [selectedStrategy]);

  useEffect(() => {
    refresh();
    const id = setInterval(refresh, 10_000);
    return () => clearInterval(id);
  }, [refresh]);

  const tabs = [
    { id: 'arena',     label: '🏟️ Arena' },
    { id: 'charts',    label: '📈 Charts' },
    { id: 'positions', label: `📋 Positions (${positions.length})` },
    { id: 'history',   label: `📜 History (${trades.length})` },
  ];

  return (
    <div className="min-h-screen flex flex-col bg-[#0d0f17]">
      {/* Header */}
      <header className="flex items-center justify-between px-5 py-2.5 border-b border-slate-800/60 bg-[#101320]">
        <div className="flex items-center gap-3">
          <span className="text-base font-bold tracking-tight text-white">OSCAR</span>
          <span className="text-slate-700">|</span>
          <span className="text-xs text-slate-500">Arena Dashboard</span>
        </div>
        <Ticker prices={prices} />
        <div className="flex items-center gap-3 text-xs">
          {lastUpdated && <span className="text-slate-600">Updated {lastUpdated}</span>}
          <div className="flex items-center gap-1.5">
            <div className={`w-1.5 h-1.5 rounded-full ${engine?.running ? 'live-dot bg-emerald-400' : 'bg-red-500'}`} />
            <span className="text-slate-500">{engine?.running ? 'Live' : 'Paused'}</span>
          </div>
        </div>
      </header>

      {/* Body */}
      <div className="flex flex-1 overflow-hidden">
        <Sidebar
          portfolio={portfolio}
          engine={engine}
          selectedStrategy={selectedStrategy}
          setSelectedStrategy={setSelectedStrategy}
          strategies={strategies}
        />

        <main className="flex-1 p-5 overflow-y-auto">
          {/* Tabs */}
          <div className="flex gap-0 mb-5 border-b border-slate-800/60">
            {tabs.map(t => (
              <button key={t.id} onClick={() => setTab(t.id)}
                className={`px-4 py-2 text-xs font-bold transition-colors border-b-2 -mb-px
                  ${tab === t.id
                    ? 'border-blue-500 text-blue-400'
                    : 'border-transparent text-slate-500 hover:text-slate-300'}`}>
                {t.label}
              </button>
            ))}
          </div>

          {tab === 'charts'    && <ChartsTab prices={prices} />}
          {tab === 'positions' && <PositionsTab positions={positions} />}
          {tab === 'history'   && <HistoryTab trades={trades} />}
          {tab === 'arena'     && <ArenaTab arena={arena} />}
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
